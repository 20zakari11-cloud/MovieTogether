<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>غرفة مشاهدة — Movie Together</title>

  <link rel="stylesheet" href="style.css">
</head>


<body>


<!-- نافذة الاسم -->
<div class="modal-overlay" id="join-modal">

  <div class="modal-card">

    <div class="ticket-code" id="modal-room-code">
      غرفة #XXXX
    </div>

    <h2>انضم إلى الغرفة</h2>

    <p class="sub">
      اختر اسمًا يظهر لبقية المشاهدين في الدردشة
    </p>


    <label class="field-label">
      اسمك
    </label>


    <input
      class="field-input"
      id="username-input"
      type="text"
      maxlength="20"
      placeholder="مثال: أحمد"
      autocomplete="off"
    >


    <div class="form-error" id="username-error"></div>


    <button
      class="btn-primary"
      id="join-btn"
      type="button">
      دخول الغرفة
    </button>


  </div>

</div>



<!-- رأس الغرفة -->

<header class="room-header">

  <div class="brand">
    <span class="brand-mark">🎬</span>
  </div>


  <div class="room-id-pill">
    غرفة <b id="room-id-label">----</b>
  </div>


  <span class="room-id-pill" id="sync-mode-pill">

    <span id="sync-mode-text">
      …
    </span>

  </span>


  <div class="room-actions">

    <button
      class="icon-btn"
      id="copy-link-btn">
      🔗
    </button>


    <a
      class="icon-btn"
      href="index.html">
      ✕
    </a>

  </div>


</header>




<div class="room-layout">


<!-- المشغل -->

<div class="player-col">


<div class="player-wrap" id="player-wrap">

  <div id="youtube-player-container" class="hidden"></div>

  <video id="video-player" controls playsinline></video>


<!-- YouTube Player -->

<div
id="youtube-player-container"
class="hidden">
</div>



<!-- MP4 / M3U8 Player -->

<video
id="video-player"
controls
playsinline>
</video>




<div
class="player-empty-state"
id="player-empty-state">


<div>

<div class="ic">
🎞️
</div>


<div>
ألصق رابط فيديو (MP4 أو M3U8 أو YouTube) بالأسفل
</div>


</div>


</div>





<button
class="player-fullscreen-btn"
id="player-fullscreen-btn">

⛶

</button>





<div
class="fullscreen-chat-toast"
id="fullscreen-chat-toast">

<span>
💬
</span>

<span id="fullscreen-toast-text"></span>

</div>





<div
class="buffering-overlay hidden"
id="buffering-overlay">


<div class="buffering-box">


<div class="spinner"></div>


<div
class="buffering-label"
id="buffering-label">

جارِ التخزين المؤقت…

</div>



<div class="buffer-bar-track">

<div
class="buffer-bar-fill"
id="buffer-bar-fill">
</div>

</div>



<div
class="buffering-sub"
id="buffering-sub">

٠ من ٢٥ ثانية

</div>


</div>


</div>



</div>





<div class="source-bar">


<input
class="field-input"
id="video-url-input"
type="text"
placeholder="ألصق رابط الفيديو هنا (mp4 / m3u8 / youtube)"
autocomplete="off">


<button
id="load-video-btn">
تحميل
</button>



<button
class="icon-btn"
id="net-settings-toggle">

⚙️

</button>



</div>





<div class="net-status-bar">


<label class="switch-row">


<input
type="checkbox"
id="slow-mode-toggle"
checked>


<span class="switch-track">
<span class="switch-thumb"></span>
</span>


<span class="switch-label">
وضع الاتصال الضعيف
</span>


</label>



<span
class="ratio-badge"
id="ratio-badge">


<span
class="dot"
id="ratio-dot">
</span>


<span id="ratio-text">
— جارِ القياس
</span>


</span>


</div>





<div class="sync-status">

<span class="dot"></span>

<span id="sync-status-text">
جاهز
</span>

</div>




<div
class="viewers-row"
id="viewers-row">

</div>



</div>






<!-- الدردشة -->


<aside class="chat-col">


<div class="chat-head">

<h2>
الدردشة
</h2>


<span
class="count"
id="chat-count">

0 رسالة

</span>


</div>



<div
class="chat-messages"
id="chat-messages">


<div
class="chat-empty"
id="chat-empty">

لا رسائل بعد — كن أول من يكتب 👋

</div>


</div>





<div class="chat-input-row">


<input
id="chat-input"
type="text"
placeholder="اكتب رسالة…"
maxlength="300">


<button
id="chat-send-btn">

➤

</button>


</div>



</aside>



</div>




<div
class="copy-toast"
id="copy-toast">

تم نسخ رابط الغرفة ✓

</div>





<!-- Firebase -->

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>


<script src="firebase-config.js"></script>

<script src="firebase-backend.js"></script>




<!-- HLS -->

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>




<!-- MP4 -->

<script src="mp4-chunked-player.js"></script>




<!-- YouTube -->

<script src="https://www.youtube.com/iframe_api"></script>




<script src="script.js"></script>



</body>

</html>
